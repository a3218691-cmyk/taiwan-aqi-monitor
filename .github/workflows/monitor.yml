name: AQI Monitor

on:
  schedule:
    - cron: "0 * * * *"  # 每小時執行一次
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  fetch-and-alert:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch AQI, store history, plot trend, alert if exceeded
        env:
          MOENV_API_KEY: ${{ secrets.MOENV_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python src/run.py

      - name: Commit updated chart
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add charts/trend.png
          git diff --cached --quiet || git commit -m "chore: update AQI trend chart"
          git push
